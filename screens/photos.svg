<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="사진첩 화면 목업">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3D352C" flood-opacity="0.06"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3D352C" flood-opacity="0.05"/>
    </filter>
    <clipPath id="thumb1"><rect x="20" y="406" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb2"><rect x="140" y="406" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb3"><rect x="260" y="406" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb4"><rect x="20" y="572" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb5"><rect x="140" y="572" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb6"><rect x="20" y="738" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb7"><rect x="140" y="738" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="thumb8"><rect x="260" y="738" width="110" height="110" rx="14"/></clipPath>
    <clipPath id="screenClip"><rect x="0" y="0" width="390" height="844"/></clipPath>
  </defs>

  <g clip-path="url(#screenClip)">
  <!-- Base background -->
  <rect x="0" y="0" width="390" height="844" fill="#FFF9F0"/>

  <!-- ============ STATUS BAR ============ -->
  <text x="20" y="29" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#3D352C">9:41</text>
  <!-- signal -->
  <g fill="#3D352C">
    <rect x="318" y="18" width="3" height="8" rx="1"/>
    <rect x="323" y="15" width="3" height="11" rx="1"/>
    <rect x="328" y="12" width="3" height="14" rx="1"/>
    <rect x="333" y="9" width="3" height="17" rx="1"/>
  </g>
  <!-- wifi -->
  <g fill="none" stroke="#3D352C" stroke-width="1.6" stroke-linecap="round">
    <path d="M343 15.5 a7.5 7.5 0 0 1 11 0"/>
    <path d="M345.6 19 a4 4 0 0 1 5.8 0"/>
  </g>
  <circle cx="348.5" cy="22.5" r="1.2" fill="#3D352C"/>
  <!-- battery -->
  <rect x="360" y="11" width="20" height="11" rx="3" fill="none" stroke="#3D352C" stroke-width="1.2"/>
  <rect x="362" y="13" width="14" height="7" rx="1.5" fill="#3D352C"/>
  <rect x="381" y="14" width="1.6" height="5" rx="0.8" fill="#3D352C"/>

  <!-- ============ HEADER ============ -->
  <text x="20" y="78" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#3D352C">사진첩</text>
  <!-- header right glyph: photo stack icon -->
  <g transform="translate(345,58)">
    <rect x="0" y="3" width="22" height="18" rx="5" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1"/>
    <circle cx="6.5" cy="9.5" r="2.2" fill="#FFD66B"/>
    <path d="M3 18 l5.5 -6 4 4 3 -3 4.5 5" fill="none" stroke="#9A8B7B" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="20" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#6F6557">3,649장의 추억이 정리됐어요</text>

  <!-- ============ ACTION BUTTONS ============ -->
  <!-- Button 1: 과거 사진 전체 가져오기 (primary) -->
  <g filter="url(#softShadow)">
    <rect x="20" y="118" width="350" height="44" rx="14" fill="#FFD66B"/>
  </g>
  <g transform="translate(36,133)">
    <path d="M7 0 v9 M3 6 l4 3.5 4 -3.5 M0 13 h14" fill="none" stroke="#A87C2F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="62" y="146" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#A87C2F">과거 사진 전체 가져오기</text>

  <!-- Button 2: 스마트 정리 -->
  <rect x="20" y="170" width="350" height="42" rx="13" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1"/>
  <g transform="translate(37,184)">
    <path d="M0 8 l8 -8 M5 3 l2 2 M9 1 l3 3 M2 12 l4 -1 -3 -3 -1 4z" fill="none" stroke="#9FD8BE" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10.5" cy="9.5" r="1.4" fill="#9FD8BE"/>
  </g>
  <text x="60" y="196" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#3D352C">스마트 정리</text>
  <text x="138" y="196" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B">비슷한 사진 모으기</text>

  <!-- Button 3: 백업 원본 -->
  <rect x="20" y="220" width="350" height="42" rx="13" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1"/>
  <g transform="translate(36,235)">
    <path d="M3.5 11 a4 4 0 0 1 0.5 -8 a5 5 0 0 1 9.3 1.2 a3.3 3.3 0 0 1 -0.3 6.8 z" fill="#D6E6F5" stroke="#A8C8EC" stroke-width="1.3" stroke-linejoin="round"/>
  </g>
  <text x="60" y="246" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#3D352C">백업 원본</text>
  <text x="118" y="246" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B">앨범·액자용</text>

  <!-- ============ SELECT HINT ============ -->
  <text x="20" y="284" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9A8B7B">사진을 길게 누르면 여러 장을 한 번에 정리할 수 있어요</text>

  <!-- ============ FILTER CHIPS ============ -->
  <!-- 전체 (active) -->
  <rect x="20" y="298" width="52" height="32" rx="16" fill="#FFD66B"/>
  <text x="46" y="318" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#A87C2F" text-anchor="middle">전체</text>
  <!-- 하준 -->
  <rect x="80" y="298" width="56" height="32" rx="16" fill="#F3E9DA" stroke="#E8D9C3" stroke-width="1"/>
  <text x="108" y="318" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#6F6557" text-anchor="middle">하준</text>
  <!-- 미분류 -->
  <rect x="144" y="298" width="64" height="32" rx="16" fill="#F3E9DA" stroke="#E8D9C3" stroke-width="1"/>
  <text x="176" y="318" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#6F6557" text-anchor="middle">미분류</text>
  <!-- 즐겨찾기 -->
  <rect x="216" y="298" width="92" height="32" rx="16" fill="#F3E9DA" stroke="#E8D9C3" stroke-width="1"/>
  <text x="232" y="318" font-family="-apple-system, system-ui, sans-serif" font-size="13" text-anchor="start">💛</text>
  <text x="252" y="318" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#6F6557">즐겨찾기</text>
  <!-- chevron hint for scrollable chips -->
  <path d="M322 308 l5 6 -5 6" fill="none" stroke="#9A8B7B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- ============ DATE SECTION 1: 오늘 ============ -->
  <text x="20" y="382" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="700" fill="#3D352C">오늘</text>
  <text x="370" y="382" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B" text-anchor="end">3장</text>

  <!-- Thumb 1 -->
  <g filter="url(#cardShadow)"><rect x="20" y="406" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb1)">
    <rect x="20" y="406" width="110" height="110" fill="#F8DAD0"/>
    <circle cx="50" cy="436" r="14" fill="#FFE7A3"/>
    <path d="M20 500 l24 -30 22 18 18 -16 26 28 v16 h-110z" fill="#E5DBF0"/>
    <path d="M70 516 l20 -22 40 30 v8 h-60z" fill="#CFEBDD" opacity="0.9"/>
  </g>

  <text x="20" y="714" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="700" fill="#3D352C">2주 전</text>
  <text x="370" y="714" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B" text-anchor="end">4장</text>

  <!-- Thumb 6 -->
  <g filter="url(#cardShadow)"><rect x="20" y="738" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb6)">
    <rect x="20" y="738" width="110" height="110" fill="#E5DBF0"/>
    <circle cx="50" cy="768" r="15" fill="#FFE7A3"/>
    <path d="M20 836 l28 -30 24 20 38 -24 v34 h-90z" fill="#CFEBDD"/>
  </g>


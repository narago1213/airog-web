  <text x="370" y="548" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B" text-anchor="end">2장</text>

  <!-- Thumb 4 -->
  <g filter="url(#cardShadow)"><rect x="20" y="572" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb4)">
    <rect x="20" y="572" width="110" height="110" fill="#CFEBDD"/>
    <circle cx="48" cy="600" r="15" fill="#FFE7A3"/>
    <path d="M20 668 l28 -30 24 20 20 -16 38 32 v8 h-130z" fill="#D6E6F5"/>
    <path d="M70 682 l24 -22 36 26 v6 h-60z" fill="#9FD8BE" opacity="0.7"/>
  </g>
  <!-- heart badge (favorite) bottom-right -->
  <g transform="translate(110,662)">
    <rect x="0" y="0" width="18" height="18" rx="9" fill="#241E18" opacity="0.5"/>
    <path d="M9 14 C4 10.5 5 6.5 7.4 6.5 C8.4 6.5 9 7.4 9 7.4 C9 7.4 9.6 6.5 10.6 6.5 C13 6.5 14 10.5 9 14z" fill="#FFD66B"/>
  </g>

  <!-- Thumb 5 -->
  <g filter="url(#cardShadow)"><rect x="140" y="572" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb5)">
    <rect x="140" y="572" width="110" height="110" fill="#F8DAD0"/>
    <circle cx="222" cy="602" r="16" fill="#FFE7A3"/>
    <path d="M140 670 l30 -32 24 20 26 -22 30 30 v6 h-140z" fill="#E5DBF0"/>

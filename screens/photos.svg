  <g filter="url(#cardShadow)"><rect x="140" y="738" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb7)">
    <rect x="140" y="738" width="110" height="110" fill="#D6E6F5"/>
    <circle cx="220" cy="766" r="14" fill="#FFE7A3"/>
    <path d="M140 834 l30 -30 26 22 24 -18 30 26 v6 h-140z" fill="#F8DAD0"/>
  </g>

  <!-- Thumb 8 -->
  <g filter="url(#cardShadow)"><rect x="260" y="738" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb8)">
    <rect x="260" y="738" width="110" height="110" fill="#CFEBDD"/>
    <circle cx="342" cy="768" r="14" fill="#FFE7A3"/>
    <path d="M260 834 l26 -28 24 20 22 -16 18 16 v8 h-110z" fill="#E5DBF0"/>
  </g>
  <!-- ☁️ backup badge on thumb 8 -->
  <g transform="translate(348,742)">
    <rect x="0" y="0" width="18" height="18" rx="9" fill="#241E18" opacity="0.55"/>
    <path d="M5 12 a2.6 2.6 0 0 1 0.3 -5.2 a3.3 3.3 0 0 1 6 0.8 a2.1 2.1 0 0 1 -0.2 4.4 z" fill="#FFF9F0"/>
  </g>

  <!-- fade scrim above tab bar so grid scrolls under -->
  <rect x="0" y="744" width="390" height="20" fill="#FFF9F0" opacity="0.85"/>

  <!-- ============ TAB BAR ============ -->
  <rect x="0" y="764" width="390" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="764" x2="390" y2="764" stroke="#EFE5D6" stroke-width="1"/>

  <!-- Tab 1: 홈 -->
  <g transform="translate(39,782)">
    <path d="M0 8 l9 -8 9 8 M2 6 v9 h14 v-9" fill="none" stroke="#9A8B7B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="48" y="816" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9A8B7B" text-anchor="middle">홈</text>

  <!-- Tab 2: 일기 -->
  <g transform="translate(108,781)">
    <rect x="0" y="0" width="16" height="18" rx="3" fill="none" stroke="#9A8B7B" stroke-width="1.6"/>
    <path d="M3.5 5 h9 M3.5 9 h9 M3.5 13 h5" stroke="#9A8B7B" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <text x="117" y="816" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9A8B7B" text-anchor="middle">일기</text>

  <!-- Tab 3: 사진 (ACTIVE) -->
  <rect x="161" y="776" width="68" height="30" rx="15" fill="#FFE7A3"/>
  <g transform="translate(185,783)">
    <rect x="0" y="2" width="20" height="16" rx="4" fill="none" stroke="#A87C2F" stroke-width="1.7"/>
    <circle cx="5.5" cy="8" r="2" fill="#A87C2F"/>
    <path d="M2 15 l5 -5 4 3 3 -3 4 5" fill="none" stroke="#A87C2F" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="195" y="819" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#A87C2F" text-anchor="middle">사진</text>

  <!-- Tab 4: 기록 -->
  <g transform="translate(265,781)">
    <path d="M1 17 v-7 M6.5 17 v-12 M12 17 v-9 M17 17 v-16" fill="none" stroke="#9A8B7B" stroke-width="1.7" stroke-linecap="round"/>
  </g>
  <text x="274" y="816" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9A8B7B" text-anchor="middle">기록</text>

  <!-- Tab 5: 가족 -->
  <g transform="translate(335,781)">
    <circle cx="6" cy="5" r="3.4" fill="none" stroke="#9A8B7B" stroke-width="1.6"/>
    <circle cx="13.5" cy="6.5" r="2.6" fill="none" stroke="#9A8B7B" stroke-width="1.4"/>
    <path d="M0.5 17 a6 6 0 0 1 11 0 M11.5 17 a5 5 0 0 1 6.5 -4.5" fill="none" stroke="#9A8B7B" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="344" y="816" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9A8B7B" text-anchor="middle">가족</text>

  <!-- home indicator -->
  <rect x="127" y="832" width="136" height="5" rx="2.5" fill="#E8D9C3"/>
  </g>
</svg>

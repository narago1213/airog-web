    <path d="M140 508 l22 -18 28 22 v6 h-50z" fill="#A8C8EC" opacity="0.7"/>
  </g>
  <!-- 💬 comment badge (top-left) -->
  <g transform="translate(146,412)">
    <rect x="0" y="0" width="30" height="18" rx="9" fill="#241E18" opacity="0.55"/>
    <path d="M6 5 h12 a2 2 0 0 1 2 2 v4 a2 2 0 0 1 -2 2 h-7 l-3 3 v-3 h-2 a2 2 0 0 1 -2 -2 v-4 a2 2 0 0 1 2 -2z" fill="#FFF9F0"/>
    <text x="23" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF9F0">1</text>
  </g>

  <!-- Thumb 3 -->
  <g filter="url(#cardShadow)"><rect x="260" y="406" width="110" height="110" rx="14" fill="#F3E9DA"/></g>
  <g clip-path="url(#thumb3)">
    <rect x="260" y="406" width="110" height="110" fill="#E5DBF0"/>
    <circle cx="345" cy="434" r="13" fill="#FFE7A3"/>
    <path d="M260 502 l26 -28 24 20 22 -18 18 18 v14 h-110z" fill="#F8DAD0"/>
    <path d="M260 510 l18 -14 24 18 v8 h-42z" fill="#CFEBDD" opacity="0.85"/>
  </g>


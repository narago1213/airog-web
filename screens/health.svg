    <rect x="201" y="504" width="169" height="48" rx="14" fill="#F8DAD0"/>
    <rect x="201.5" y="504.5" width="168" height="47" rx="13.5" fill="none" stroke="#F0B6A6" stroke-width="1"/>
    <text x="221" y="533" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">🤒 증상·발열</text>
  </g>
  <!-- 투약 (lilac) -->
  <g>
    <rect x="20" y="562" width="169" height="48" rx="14" fill="#E5DBF0"/>
    <rect x="20.5" y="562.5" width="168" height="47" rx="13.5" fill="none" stroke="#CBBCE0" stroke-width="1"/>
    <text x="40" y="591" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">💊 투약</text>
  </g>

  <text x="20" y="666" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9A8B7B">26개월 · 2024년 4월 2일생</text>

  <!-- timeline rail -->
  <line x1="34" y1="694" x2="34" y2="952" stroke="#E8D9C3" stroke-width="2"/>

  <!-- Timeline item 1 — 예방접종 (blue) -->
  <circle cx="34" cy="704" r="6" fill="#A8C8EC" stroke="#FFF9F0" stroke-width="2.5"/>
  <rect x="54" y="688" width="316" height="62" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
  <rect x="54.5" y="688.5" width="315" height="61" rx="15.5" fill="none" stroke="#EFE5D6" stroke-width="1"/>
  <rect x="54" y="688" width="5" height="62" rx="2.5" fill="#A8C8EC"/>
  <rect x="56" y="688" width="3" height="62" fill="#A8C8EC"/>
  <text x="72" y="710" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">홍역 MMR 2차</text>
  <text x="72" y="729" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6F6557">예방접종 · 2026년 6월 18일</text>
  <text x="72" y="744" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9A8B7B">소아과 클리닉</text>

  <!-- Timeline item 2 — 증상 (blush) -->
  <circle cx="34" cy="778" r="6" fill="#F8DAD0" stroke="#FFF9F0" stroke-width="2.5"/>
  <rect x="54" y="762" width="316" height="62" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
  <rect x="54.5" y="762.5" width="315" height="61" rx="15.5" fill="none" stroke="#EFE5D6" stroke-width="1"/>
  <rect x="54" y="762" width="5" height="62" rx="2.5" fill="#F8DAD0"/>
  <rect x="56" y="762" width="3" height="62" fill="#F8DAD0"/>
  <text x="72" y="784" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">감기 증상</text>
  <text x="72" y="803" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6F6557">증상·발열 · 2026년 6월 15일</text>
  <text x="72" y="818" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9A8B7B">📝 코 흘림, 미열 38.2℃</text>

  <!-- Timeline item 3 — 투약 (lilac) -->
  <circle cx="34" cy="852" r="6" fill="#E5DBF0" stroke="#FFF9F0" stroke-width="2.5"/>
  <rect x="54" y="836" width="316" height="62" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
  <rect x="54.5" y="836.5" width="315" height="61" rx="15.5" fill="none" stroke="#EFE5D6" stroke-width="1"/>
  <rect x="54" y="836" width="5" height="62" rx="2.5" fill="#E5DBF0"/>
  <rect x="56" y="836" width="3" height="62" fill="#E5DBF0"/>
  <text x="72" y="858" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">감기약 복용</text>
  <text x="72" y="877" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6F6557">투약 · 2026년 6월 15일</text>
  <text x="72" y="892" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9A8B7B">📝 소아용 감기약 10mL · 하루 3회</text>

  <!-- Timeline item 4 — 병원 방문 (mint) -->
  <circle cx="34" cy="926" r="6" fill="#9FD8BE" stroke="#FFF9F0" stroke-width="2.5"/>
  <rect x="54" y="910" width="316" height="62" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
  <rect x="54.5" y="910.5" width="315" height="61" rx="15.5" fill="none" stroke="#EFE5D6" stroke-width="1"/>
  <rect x="54" y="910" width="5" height="62" rx="2.5" fill="#9FD8BE"/>
  <rect x="56" y="910" width="3" height="62" fill="#9FD8BE"/>
  <text x="72" y="932" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3D352C">정기 검진</text>
  <text x="72" y="951" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6F6557">병원 방문 · 2026년 6월 10일</text>
  <text x="72" y="966" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9A8B7B">소아과 · 발달 정상</text>

  <!-- hint -->
  <text x="195" y="1000" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9A8B7B">기록을 길게 누르면 수정·삭제할 수 있어요</text>
  </g>

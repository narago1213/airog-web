<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="발달 이정표 화면">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#A87C2F" flood-opacity="0.07"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3D352C" flood-opacity="0.05"/>
    </filter>
    <clipPath id="screenClip"><rect x="0" y="0" width="390" height="844" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#screenClip)">
    <!-- base background -->
    <rect x="0" y="0" width="390" height="844" fill="#FFF9F0"/>

    <!-- ===== status bar ===== -->
    <text x="24" y="29" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#3D352C">9:41</text>
    <!-- signal -->
    <g fill="#3D352C">
      <rect x="320" y="20" width="3" height="8" rx="1"/>
      <rect x="325" y="17" width="3" height="11" rx="1"/>
      <rect x="330" y="14" width="3" height="14" rx="1"/>
      <rect x="335" y="11" width="3" height="17" rx="1"/>
    </g>
    <!-- wifi -->
    <g fill="none" stroke="#3D352C" stroke-width="1.6" stroke-linecap="round">
      <path d="M344 18 q8 -7 16 0"/>
      <path d="M347 22 q5 -4 10 0"/>
    </g>
    <circle cx="352" cy="26" r="1.2" fill="#3D352C"/>
    <!-- battery -->
    <g>
      <rect x="366" y="14" width="20" height="11" rx="2.5" fill="none" stroke="#3D352C" stroke-width="1.2"/>
      <rect x="387" y="17" width="1.6" height="5" rx="0.8" fill="#3D352C"/>
      <rect x="368" y="16" width="14" height="7" rx="1.2" fill="#3D352C"/>
    </g>

    <!-- ===== top bar: back ===== -->
    <text x="20" y="62" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" fill="#6F6557">‹ 뒤로</text>

    <!-- ===== screen title ===== -->
    <text x="20" y="100" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#3D352C">발달 이정표</text>
    <text x="20" y="122" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#9A8B7B">하준 · 생후 26개월</text>

    <!-- ===== disclaimer ===== -->
    <g transform="translate(20,138)">
      <rect x="0" y="0" width="350" height="48" rx="14" fill="#F3E9DA"/>
      <rect x="0" y="0" width="4" height="48" rx="2" fill="#E8D9C3"/>
      <text x="16" y="20" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11.5" fill="#6F6557">아이마다 발달 속도는 달라요. 참고용 이정표이며,</text>
      <text x="16" y="36" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11.5" fill="#6F6557">걱정되는 점은 영유아검진·전문의와 상담하세요.</text>
    </g>

    <!-- ===== progress card ===== -->
    <g transform="translate(20,200)">
      <rect x="0" y="0" width="350" height="92" rx="20" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1" filter="url(#cardShadow)"/>
      <!-- ring -->
      <g transform="translate(48,46)">
        <circle cx="0" cy="0" r="26" fill="none" stroke="#F3E9DA" stroke-width="7"/>
        <circle cx="0" cy="0" r="26" fill="none" stroke="#FFD66B" stroke-width="7" stroke-linecap="round"
                stroke-dasharray="163.4" stroke-dashoffset="66.4" transform="rotate(-90)"/>
        <text x="0" y="2" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#A87C2F">59%</text>
        <text x="0" y="15" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="9" fill="#9A8B7B">달성</text>
      </g>
      <text x="92" y="38" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#3D352C">🌱 19 / 32 달성</text>
      <text x="92" y="62" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6F6557">이정표를 눌러 달성한 날과 사진을 남겨보세요.</text>
    </g>

    <!-- ===== 9개월 ===== -->
    <text x="20" y="324" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#9A8B7B" letter-spacing="0.4">9개월</text>

    <!-- list item: 미달성 - 혼자 앉아 있어요 -->
    <g transform="translate(20,334)">
      <rect x="0" y="0" width="350" height="52" rx="16" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1" filter="url(#softShadow)"/>
      <!-- empty check circle -->
      <circle cx="28" cy="26" r="11" fill="none" stroke="#E8D9C3" stroke-width="1.6"/>
      <text x="50" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" fill="#3D352C">혼자 앉아 있어요</text>
      <text x="50" y="40" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#9A8B7B">🤸 신체</text>
    </g>

    <!-- list item: 달성 - 기어다녀요 -->
    <g transform="translate(20,394)">
      <rect x="0" y="0" width="350" height="52" rx="16" fill="#FFE7A3" stroke="#FFD66B" stroke-width="1"/>
      <circle cx="28" cy="26" r="11" fill="#FFD66B"/>
      <path d="M23 26 l3.4 3.4 L33 22.5" fill="none" stroke="#A87C2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#3D352C">기어다녀요</text>
      <text x="50" y="40" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#A87C2F">2026년 6월 15일</text>
      <!-- photo chip -->
      <rect x="316" y="14" width="24" height="24" rx="7" fill="#FFF9F0" stroke="#FFD66B" stroke-width="1"/>
      <text x="328" y="31" text-anchor="middle" font-size="12">📷</text>
    </g>

    <!-- ===== 12개월 ===== -->
    <text x="20" y="478" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#9A8B7B" letter-spacing="0.4">12개월 (1돌)</text>

    <!-- list item: 달성 - 잡고 일어서요 -->
    <g transform="translate(20,488)">
      <rect x="0" y="0" width="350" height="52" rx="16" fill="#FFE7A3" stroke="#FFD66B" stroke-width="1"/>
      <circle cx="28" cy="26" r="11" fill="#FFD66B"/>
      <path d="M23 26 l3.4 3.4 L33 22.5" fill="none" stroke="#A87C2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#3D352C">잡고 일어서요</text>
      <text x="50" y="40" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#A87C2F">2026년 6월 8일</text>
    </g>

    <!-- list item: 달성 - 첫 단어 (taller w/ note) -->
    <g transform="translate(20,548)">
      <rect x="0" y="0" width="350" height="60" rx="16" fill="#FFE7A3" stroke="#FFD66B" stroke-width="1"/>
      <circle cx="28" cy="30" r="11" fill="#FFD66B"/>
      <path d="M23 30 l3.4 3.4 L33 26.5" fill="none" stroke="#A87C2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="26" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#3D352C">첫 단어를 말해요 (예: 엄마·아빠) 🗣</text>
      <text x="50" y="46" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#A87C2F">2026년 6월 10일 · 엄마라고 했어요</text>
    </g>

    <!-- ===== 15개월 ===== -->
    <text x="20" y="640" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#9A8B7B" letter-spacing="0.4">15개월</text>

    <!-- list item: 달성 - 첫 걸음 -->
    <g transform="translate(20,650)">
      <rect x="0" y="0" width="350" height="52" rx="16" fill="#FFE7A3" stroke="#FFD66B" stroke-width="1"/>
      <circle cx="28" cy="26" r="11" fill="#FFD66B"/>
      <path d="M23 26 l3.4 3.4 L33 22.5" fill="none" stroke="#A87C2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#3D352C">첫 걸음 — 혼자 걸어요 👣</text>
      <text x="50" y="40" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#A87C2F">2026년 6월 2일</text>
      <rect x="316" y="14" width="24" height="24" rx="7" fill="#FFF9F0" stroke="#FFD66B" stroke-width="1"/>
      <text x="328" y="31" text-anchor="middle" font-size="12">📷</text>
    </g>

    <!-- ===== 24개월 ===== -->
    <text x="20" y="734" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#9A8B7B" letter-spacing="0.4">24개월</text>

    <!-- list item: 미달성 - 잘 뛰어요 -->
    <g transform="translate(20,744)">
      <rect x="0" y="0" width="350" height="52" rx="16" fill="#FFFFFF" stroke="#EFE5D6" stroke-width="1" filter="url(#softShadow)"/>
      <circle cx="28" cy="26" r="11" fill="none" stroke="#E8D9C3" stroke-width="1.6"/>
      <text x="50" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14.5" fill="#3D352C">잘 뛰어요</text>
      <text x="50" y="40" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#9A8B7B">🤸 신체</text>
    </g>

    <!-- bottom fade hint for scroll -->
    <rect x="0" y="812" width="390" height="32" fill="#FFF9F0" opacity="0.85"/>
    <rect x="155" y="834" width="80" height="5" rx="2.5" fill="#E8D9C3"/>
  </g>
</svg>
